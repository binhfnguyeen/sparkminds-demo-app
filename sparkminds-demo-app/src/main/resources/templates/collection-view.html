<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${type}"></title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            padding: 30px;
        }

        .container {
            width: 80%;
            margin: auto;
            background: #fff;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
        }

        form input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
        }

        form input:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f9ff;
        }

        td a {
            color: #e74c3c;
            font-weight: bold;
        }

        td a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="container">
    <h2 th:text="${type}"></h2>
    <p th:text="${desc}"></p>

    <div class="actions">
        <form action="/add-demo" method="post">
            <input type="hidden" name="from" th:value="${currentPath}">
            <input type="number" step="1" placeholder="ID" name="id" required>
            <input type="text" name="name" placeholder="Name" required>
            <input type="number" step="0.1" name="score" placeholder="Score" required>
            <button type="submit">Quick Add</button>
        </form>
        <a href="/">← Back to Menu</a>
    </div>

    <table>
        <tr><th>ID</th><th>Name</th><th>Score</th><th>Action</th></tr>
        <tr th:each="s : ${students}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.score}"></td>
            <td><a th:href="@{'/delete/' + ${s.id}(from=${currentPath})}">Delete</a></td>
        </tr>
    </table>
</div>
</body>
</html>
