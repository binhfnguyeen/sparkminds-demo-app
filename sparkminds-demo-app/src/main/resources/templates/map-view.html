<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${type}"></title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            padding: 30px;
        }

        .container {
            width: 85%;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        p {
            text-align: center;
            margin-bottom: 20px;
            color: #7f8c8d;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary { background: #3498db; }
        .btn-warning { background: #e67e22; }
        .btn-success { background: #27ae60; }
        .btn-danger { background: #e74c3c; }

        .btn:hover { opacity: 0.85; }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f9ff;
        }

        .key {
            font-weight: bold;
            color: #2980b9;
        }

        .note {
            margin-top: 15px;
            padding: 10px;
            background: #fef5e7;
            border-left: 5px solid #f39c12;
            font-size: 14px;
        }

        .link {
            color: #3498db;
            font-weight: 500;
            text-decoration: none;
            margin-left: auto;
            padding-left: 20px;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="container">

    <h2 th:text="${type}"></h2>
    <p th:text="${desc}"></p>

    <!-- SWITCH -->
    <div class="actions">
        <div>
            <a href="/map-demo" class="btn btn-primary">HashMap</a>
            <a href="/map-demo?type=linked" class="btn btn-warning">LinkedHashMap</a>
            <a href="/map-demo?type=tree" class="btn btn-success">TreeMap</a>
        </div>

        <a href="/" class="link">← Back</a>
    </div>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Key (ID)</th>
            <th>Name</th>
            <th>Score</th>
            <th>Action</th>
        </tr>

        <tr th:each="entry : ${studentMap}">
            <td class="key" th:text="${entry.key}"></td>
            <td th:text="${entry.value.name}"></td>
            <td th:classappend="${entry.value.score >= 8} ? 'high' : (${entry.value.score < 5} ? 'low' : '')"
                th:text="${entry.value.score}">
            </td>
            <td>
                <a class="btn btn-danger"
                   th:href="@{'/delete/' + ${entry.key}(from='map-demo')}">
                    Delete
                </a>
            </td>
        </tr>
    </table>

    <!-- NOTE -->
    <div class="note">
        HashMap: nhanh nhất, không thứ tự <br>
        LinkedHashMap: giữ thứ tự insert <br>
        TreeMap: tự động sort theo Key (O(log n)) <br>
        Key không được trùng (put sẽ override)
    </div>

</div>
</body>
</html>
